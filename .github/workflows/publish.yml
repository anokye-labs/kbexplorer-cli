name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm install -g npm@latest

      # OIDC trusted publishing (npmjs.com) is the auth path for this workflow.
      # NODE_AUTH_TOKEN is explicitly set to '' rather than omitted: setup-node
      # unconditionally writes `_authToken=${NODE_AUTH_TOKEN}` into .npmrc, and
      # per npm's own docs an env var referenced via ${VAR} that is completely
      # UNDEFINED is left unreplaced (the literal, bogus string), whereas a
      # DEFINED-but-empty var substitutes cleanly to "". If trusted publishing
      # isn't registered yet, this step fails with ENEEDAUTH until it is.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ''
